name: Release

# v* 태그(예: v0.1.0)를 push하면 Windows·Linux 설치 파일을 빌드해
# GitHub Release(Draft)에 Assets로 업로드합니다.
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''
          - platform: 'ubuntu-22.04'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            patchelf \
            build-essential \
            file \
            wget \
            curl

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Extract release notes from CHANGELOG
        id: changelog
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          # CHANGELOG.md에서 "## [<version>]" 헤딩 아래 내용을
          # 다음 버전 헤딩 또는 링크 참조 정의 직전까지 추출한다.
          section="$(awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { cap=1; next }
            cap && /^## \[/ { exit }
            cap && /^\[[^]]+\]: / { exit }
            cap { print }
          ' CHANGELOG.md)"
          if [ -z "$(printf '%s' "$section" | tr -d '[:space:]')" ]; then
            section="이 버전의 변경 사항은 [CHANGELOG.md](https://github.com/${GITHUB_REPOSITORY}/blob/main/CHANGELOG.md)를 참고하세요."
          fi
          {
            echo "notes<<CHANGELOG_EOF"
            echo "${section}"
            echo ""
            echo "---"
            echo ""
            echo "### ⬇️ 다운로드"
            echo "아래 Assets에서 플랫폼에 맞는 설치 파일을 내려받으세요."
            echo ""
            echo "- **Windows**: \`.msi\` 또는 \`.exe\`(NSIS) 설치 파일"
            echo "- **Linux**: \`.AppImage\`, \`.deb\`, \`.rpm\`"
            echo ""
            echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/commits/${GITHUB_REF_NAME}"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'token-usage-app v__VERSION__'
          releaseBody: ${{ steps.changelog.outputs.notes }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
